database:
  name: africa-thrift-db
  plan: free
  databaseName: africa_thrift
  ipAllowList: []

web:
  name: africa-thrift
  plan: free
  region: oregon
  buildCommand: npm install && npx prisma generate && npm run build
  startCommand: npm start
  healthCheckPath: /
  envVars:
    - key: DATABASE_URL
      fromDatabase:
        name: africa-thrift-db
        property: connectionString
